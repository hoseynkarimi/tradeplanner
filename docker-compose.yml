version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-change-this-to-a-long-random-string}
      - JWT_EXPIRES_IN=7d
    volumes:
      - app-data:/app/data
    restart: unless-stopped

volumes:
  app-data:
