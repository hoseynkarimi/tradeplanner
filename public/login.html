<!DOCTYPE html>
<html lang="fa" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Planner</title>
<style>
:root {
  --bg: #f4f4f4;
  --card: #ffffff;
  --text: #1a1a1a;
  --text2: #7a7a7a;
  --border: #e8e8e8;
  --accent: #5b7fa5;
  --accent2: #7a9ec2;
  --hover: #f0f0f0;
  --danger: #c0392b;
  --success: #4a8c6a;
  --shadow: 0 2px 12px rgba(0,0,0,0.05);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.08);
  --radius: 10px;
  --radius-sm: 6px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Vazirmatn', 'Vazir', Tahoma, sans-serif;
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
@keyframes fadeSlideDown {
  from { opacity: 0; transform: translateX(-50%) translateY(-12px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.header-outer {
  position: fixed;
  top: 18px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 200;
  animation: fadeSlideDown 0.6s ease both;
}
.island-header {
  background: rgba(255,255,255,0.82);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border: 1px solid rgba(232,232,232,0.6);
  border-radius: 100px;
  padding: 6px;
  box-shadow: 0 2px 20px rgba(0,0,0,0.06);
  display: inline-flex;
}
.header-inner { display: flex; gap: 4px; }
.header-btn {
  padding: 10px 28px;
  border: none;
  background: transparent;
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  font-family: var(--font);
  color: var(--text2);
  border-radius: 100px;
  transition: all var(--transition);
  white-space: nowrap;
  text-decoration: none;
  display: inline-block;
}
.header-btn:hover { color: var(--text); background: rgba(91,127,165,0.06); }
.header-btn.active {
  color: #fff;
  background: var(--accent);
  box-shadow: 0 2px 8px rgba(91,127,165,0.3);
}

.auth-wrap {
  width: 400px;
  max-width: 90vw;
  animation: slideUp 0.5s ease;
}
.auth-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 40px 36px;
  box-shadow: var(--shadow-lg);
}
.auth-card .logo {
  font-size: 24px;
  font-weight: 700;
  text-align: center;
  margin-bottom: 6px;
  letter-spacing: -0.5px;
}
.auth-card .logo span { color: var(--accent); }
.auth-card .subtitle {
  text-align: center;
  font-size: 14px;
  color: var(--text2);
  margin-bottom: 28px;
}
.auth-field {
  margin-bottom: 16px;
}
.auth-field label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  margin-bottom: 5px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.auth-field input {
  width: 100%;
  padding: 11px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-family: var(--font);
  background: var(--card);
  color: var(--text);
  transition: border-color var(--transition), box-shadow var(--transition);
}
.auth-field input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(91,127,165,0.1);
}
.auth-btn {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: var(--radius-sm);
  background: var(--accent);
  color: #fff;
  font-size: 15px;
  font-weight: 600;
  font-family: var(--font);
  cursor: pointer;
  transition: background var(--transition);
  margin-top: 4px;
}
.auth-btn:hover { background: var(--accent2); }
.auth-btn:disabled { opacity: 0.6; cursor: not-allowed; }
.auth-link {
  text-align: center;
  margin-top: 20px;
  font-size: 13px;
  color: var(--text2);
}
.auth-link a {
  color: var(--accent);
  text-decoration: none;
  font-weight: 500;
  transition: color var(--transition);
}
.auth-link a:hover { color: var(--accent2); text-decoration: underline; }
.auth-error {
  background: #fde8e8;
  color: var(--danger);
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  margin-bottom: 16px;
  display: none;
}
.auth-error.show { display: block; }
@media (max-width: 480px) {
  .auth-card { padding: 28px 20px; }
  .header-outer { top: 10px; }
  .header-btn { padding: 8px 18px; font-size: 13px; }
}
</style>
</head>
<body>

<div class="header-outer">
  <div class="island-header">
    <div class="header-inner">
      <a href="/" class="header-btn active">Planner</a>
      <a href="/login.html" class="header-btn">Sign In</a>
      <a href="/register.html" class="header-btn">Register</a>
    </div>
  </div>
</div>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="logo"><span>P</span>lanner</div>
    <div class="subtitle">Sign in to your account</div>

    <div class="auth-error" id="error-msg"></div>

    <div class="auth-field">
      <label>Username or Email</label>
      <input type="text" id="input-username" placeholder="Enter your username or email" autofocus>
    </div>
    <div class="auth-field">
      <label>Password</label>
      <input type="password" id="input-password" placeholder="Enter your password">
    </div>
    <button type="button" class="auth-btn" id="login-btn">Sign In</button>

    <div class="auth-link">
      Don't have an account? <a href="/register.html">Create one</a>
    </div>
  </div>
</div>

<script>
document.getElementById('login-btn').addEventListener('click', async function() {
  var username = document.getElementById('input-username').value.trim();
  var password = document.getElementById('input-password').value;
  var errorEl = document.getElementById('error-msg');
  var btn = document.getElementById('login-btn');

  if (!username || !password) {
    errorEl.textContent = 'Please fill in all fields';
    errorEl.classList.add('show');
    return;
  }

  errorEl.classList.remove('show');
  btn.disabled = true;
  btn.textContent = 'Signing in...';

  try {
    var res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: username, password: password })
    });
    var data = await res.json();
    if (!res.ok) {
      errorEl.textContent = data.error || 'Login failed';
      errorEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Sign In';
      return;
    }
    localStorage.setItem('token', data.token);
    localStorage.setItem('user', JSON.stringify(data.user));
    window.location.href = '/';
  } catch (err) {
    errorEl.textContent = 'Connection error. Please try again.';
    errorEl.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
});

document.getElementById('input-password').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('login-btn').click();
});
</script>
</body>
</html>
